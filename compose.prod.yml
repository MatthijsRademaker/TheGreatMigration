services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: the_great_migration
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app", "-d", "the_great_migration"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      DATABASE_URL: postgres://app:app@db:5432/the_great_migration?sslmode=disable
      DB_AUTO_MIGRATE: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/hello",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  seed:
    image: alpine:3.20
    profiles:
      - ops
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./scripts:/scripts:ro
    command:
      [
        "/bin/sh",
        "-lc",
        "apk add --no-cache bash curl jq && BASE_URL=http://backend:8080 bash /scripts/seed_great_migration_from_handdrawn.sh",
      ]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
